<!doctype html>
<html lang="sv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kalender</title>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <!-- FILTERBAR: tillagd -->
    <div class="filter-bar">
        <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">
            Visa alla
        </button>
        <button class="filter-btn" id="filterFree" onclick="setFilter('free')">
            Endast lediga
        </button>
        <button class="filter-btn" id="filterBooked" onclick="setFilter('booked')">
            Endast bokade
        </button>
    </div>

    <div class="cal-header">
        <button id="prevMonth" class="nav-btn" type="button" aria-label="Previous month">
            ←
        </button>

        <div class="month-title">
            <div id="monthTitle" class="month">—</div>
            <div id="rangeTitle" class="range">—</div>
        </div>

        <button id="nextMonth" class="nav-btn" type="button" aria-label="Next month">
            →
        </button>
    </div>
    <! -- Kalender med wrapper för mobil-scroll------->
    <div class="calander-wrapper">
        <table class="calendar">
            <thead>
                <tr>
                    <th>Tid</th>
                    <th>Mån<br /><span class="date" id="d0">—</span></th>
                    <th>Tis<br /><span class="date" id="d1">—</span></th>
                    <th>Ons<br /><span class="date" id="d2">—</span></th>
                    <th>Tor<br /><span class="date" id="d3">—</span></th>
                    <th>Fre<br /><span class="date" id="d4">—</span></th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td class="time">08:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">09:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">10:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">11:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">12:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">13:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">14:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">15:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="time">16:00</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- MODAL: tillagd -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <h2 id="modalTitle">—</h2>
            <div class="modal-meta" id="modalMeta">—</div>
            <div id="modalBody"></div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <!-- TOAST: tillagd -->
    <div class="toast" id="toast"></div>

    <script src="js/script.js"></script>
</body>

</html>
